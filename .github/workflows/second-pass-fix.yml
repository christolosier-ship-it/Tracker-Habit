name: Second pass autofix

on:
  push:
    branches: [fix/second-pass-quality]

permissions:
  contents: write

jobs:
  autofix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/second-pass-quality
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply source cleanup
        run: node scripts/second-pass-fix.mjs
      - name: Install dependencies and generate lockfile
        run: npm install
      - name: Validate
        run: npm run check
      - name: Commit validated cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finaliser la seconde passe de qualité"
          git push origin HEAD:fix/second-pass-quality
