name: Regenerate lockfile

on:
  push:
    branches: [refactor/global-architecture-rationalization]
    paths: [package.json]

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/global-architecture-rationalization
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --package-lock-only
      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "Régénérer le lockfile après nettoyage des dépendances"
          git push origin HEAD:refactor/global-architecture-rationalization
