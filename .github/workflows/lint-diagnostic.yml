name: Lint diagnostic

on:
  push:
    branches: [refactor/global-architecture-rationalization]
    paths:
      - '.github/workflows/lint-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/global-architecture-rationalization
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture ESLint report
        run: npm run lint > lint-report.txt 2>&1 || true
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lint-report.txt
          git diff --cached --quiet || git commit -m "Ajouter le rapport ESLint temporaire"
          git push origin HEAD:refactor/global-architecture-rationalization
