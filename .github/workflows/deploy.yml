name: Finalize PR35 refactor

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pr35-migration
  cancel-in-progress: false

jobs:
  migrate:
    if: github.head_ref == 'refactor/mascot-engine-performance' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/mascot-engine-performance
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Generate GSAP lockfile
        run: npm install --package-lock-only --ignore-scripts --save-exact gsap@3.15.0
      - name: Assemble migration
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('scripts/pr35-parts')
          parts = [root / f'{index:02d}.part' for index in range(7)]
          missing = [path.name for path in parts if not path.exists()]
          if missing:
              raise SystemExit('Fragments manquants : ' + ', '.join(missing))

          raw = ''.join(path.read_text().rstrip('\n') for path in parts[:-1]) + parts[-1].read_text()

          def restore_external_newlines(text: str) -> str:
              output: list[str] = []
              quote: str | None = None
              triple = False
              escaped = False
              index = 0
              while index < len(text):
                  character = text[index]
                  if quote is not None:
                      if escaped:
                          output.append(character)
                          escaped = False
                          index += 1
                          continue
                      if character == '\\':
                          output.append(character)
                          escaped = True
                          index += 1
                          continue
                      if triple and text.startswith(quote * 3, index):
                          output.append(quote * 3)
                          index += 3
                          quote = None
                          triple = False
                          continue
                      if not triple and character == quote:
                          output.append(character)
                          index += 1
                          quote = None
                          continue
                      output.append(character)
                      index += 1
                      continue

                  if character in {"'", '"'}:
                      if text.startswith(character * 3, index):
                          quote = character
                          triple = True
                          output.append(character * 3)
                          index += 3
                      else:
                          quote = character
                          triple = False
                          output.append(character)
                          index += 1
                      continue

                  if character == '\\' and index + 1 < len(text) and text[index + 1] == 'n':
                      output.append('\n')
                      index += 2
                      continue

                  output.append(character)
                  index += 1

              return ''.join(output)

          content = restore_external_newlines(raw)
          Path('scripts/apply-pr35-refactor.py').write_text(content)
          print('Fragments assemblés :', ', '.join(path.name for path in parts))
          PY
          python -m py_compile scripts/apply-pr35-refactor.py
      - name: Apply migration
        run: python scripts/apply-pr35-refactor.py
      - name: Validate final tree
        run: |
          npm ci
          npm run check
      - name: Commit final refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finaliser la refonte du moteur des mascottes"
          git push origin HEAD:refactor/mascot-engine-performance
