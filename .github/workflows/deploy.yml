name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/second-pass-quality
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply second-pass cleanup
        run: node scripts/second-pass-fix.mjs
      - name: Install dependencies
        run: npm install
      - name: Quality checks
        run: npm run check
      - name: Commit validated cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finaliser la seconde passe de qualité"
          git push origin HEAD:fix/second-pass-quality
