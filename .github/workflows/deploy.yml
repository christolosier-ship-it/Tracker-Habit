name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check architecture
        run: npm run check:architecture
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Browser smoke test
        run: |
          npm run preview -- --port 4173 > preview.log 2>&1 &
          PREVIEW_PID=$!
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/Tracker-Habit/ >/dev/null && break
            sleep 1
          done
          CHROME="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          "$CHROME" \
            --headless \
            --no-sandbox \
            --disable-gpu \
            --virtual-time-budget=8000 \
            --dump-dom \
            http://127.0.0.1:4173/Tracker-Habit/ \
            > dom.html 2> chrome.log
          kill "$PREVIEW_PID" || true
          grep -q 'class="app-shell' dom.html
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
