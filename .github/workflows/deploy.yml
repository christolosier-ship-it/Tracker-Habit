name: Finalize PR35 refactor

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pr35-migration
  cancel-in-progress: false

jobs:
  migrate:
    if: github.head_ref == 'refactor/mascot-engine-performance' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/mascot-engine-performance
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Generate GSAP lockfile
        run: npm install --package-lock-only --ignore-scripts --save-exact gsap@3.15.0
      - name: Assemble migration
        run: cat scripts/pr35-parts/*.part > scripts/apply-pr35-refactor.py
      - name: Upload assembled migration
        uses: actions/upload-artifact@v4
        with:
          name: pr35-assembled-migration
          path: scripts/apply-pr35-refactor.py
          retention-days: 1
      - name: Apply migration
        run: python scripts/apply-pr35-refactor.py
      - name: Validate final tree
        run: |
          npm ci
          npm run check
      - name: Commit final refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finaliser la refonte du moteur des mascottes"
          git push origin HEAD:refactor/mascot-engine-performance
