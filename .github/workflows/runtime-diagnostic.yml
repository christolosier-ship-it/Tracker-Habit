name: Runtime diagnostic

on:
  push:
    branches: [fix/blank-page-runtime]
    paths:
      - '.github/workflows/runtime-diagnostic.yml'
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'

permissions:
  contents: read

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start preview
        run: |
          npm run preview -- --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/Tracker-Habit/ >/dev/null && exit 0
            sleep 1
          done
          cat preview.log
          exit 1
      - name: Run Chromium
        run: |
          CHROME="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          echo "Chrome: $CHROME" | tee runtime.log
          "$CHROME" \
            --headless \
            --no-sandbox \
            --disable-gpu \
            --enable-logging=stderr \
            --v=1 \
            --virtual-time-budget=8000 \
            --dump-dom \
            http://127.0.0.1:4173/Tracker-Habit/ \
            > dom.html 2>> runtime.log || true
          cat runtime.log
          test -s dom.html
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-diagnostic
          path: |
            runtime.log
            dom.html
            preview.log
